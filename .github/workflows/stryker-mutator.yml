name: Mutation Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 10

    - name: Install dependencies
      run: pnpm install

    - name: Restore Stryker incremental caches
      uses: actions/cache@v5
      with:
        path: |
          packages/engine/reports/stryker-incremental.json
          packages/names/reports/stryker-incremental.json
          packages/timeline/reports/stryker-incremental.json
          packages/state/reports/stryker-incremental.json
          backend/reports/stryker-incremental.json
        key: stryker-${{ hashFiles('packages/*/src/**/*.ts', 'backend/src/**/*.ts') }}
        restore-keys: stryker-

    - name: Run mutation testing (all packages)
      run: pnpm test:mutation:all

    - name: Upload mutation report
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: mutation-test-report
        path: |
          reports/
          packages/*/stryker.log
          backend/stryker.log
        retention-days: 30

    - name: Comment mutation score on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v8
      with:
        script: |
          const fs = require('fs');

          // Real Stryker mutation score from a per-package report.
          // score = detected / valid, where detected = Killed + Timeout and
          // valid = Killed + Timeout + Survived + NoCoverage.
          function summarise(reportPath) {
            if (!fs.existsSync(reportPath)) { return null; }
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const counts = { Killed: 0, Timeout: 0, Survived: 0, NoCoverage: 0 };
            for (const file of Object.values(report.files ?? {})) {
              for (const mutant of file.mutants ?? []) {
                if (mutant.status in counts) { counts[mutant.status]++; }
              }
            }
            const detected = counts.Killed + counts.Timeout;
            const valid = detected + counts.Survived + counts.NoCoverage;
            const score = valid > 0 ? ((detected / valid) * 100).toFixed(2) : 'N/A';
            return { score, valid, ...counts };
          }

          const packages = ['engine', 'names', 'timeline', 'state', 'backend'];
          const rows = [];
          for (const pkg of packages) {
            const s = summarise(`reports/mutation/${pkg}/mutation.json`);
            if (!s) { continue; }
            rows.push(`| ${pkg} | ${s.score}% | ${s.valid} | ${s.Killed} | ${s.Survived} | ${s.Timeout} | ${s.NoCoverage} |`);
          }

          if (rows.length === 0) {
            console.log('No mutation reports found; skipping comment.');
            return;
          }

          const body = [
            '## 🧬 Mutation Testing Results',
            '',
            '| Package | Score | Mutants | Killed | Survived | Timeout | No coverage |',
            '|---|---|---|---|---|---|---|',
            ...rows,
            '',
            '[View detailed HTML reports in the workflow artifacts.]' +
              `(${context.payload.pull_request.html_url}/checks)`,
          ].join('\n');

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body,
          });
