<!DOCTYPE html>
<html>
<head>
    <title>FM2K - Division One</title>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        header {
            background: #16213e;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #0f3460;
        }
        header h1 { margin: 0; font-size: 20px; color: #e94560; }
        header .meta { font-size: 13px; color: #aaa; }
        .layout {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 0;
            height: calc(100vh - 60px);
        }
        .main-panel { padding: 20px; overflow-y: auto; }
        .side-panel {
            background: #16213e;
            border-left: 1px solid #0f3460;
            padding: 20px;
            overflow-y: auto;
        }
        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .card-header {
            background: #0f3460;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .controls {
            padding: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .progress-bar-wrap {
            padding: 0 16px 14px;
        }
        .progress-bar-bg {
            background: #0f3460;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: #e94560;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
        button {
            padding: 9px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: #e94560; color: white; }
        .btn-secondary { background: #0f3460; color: #e0e0e0; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #c0392b; color: white; }
        button:not(:disabled):hover { opacity: 0.85; }

        /* Standings table */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            background: #0f3460;
            padding: 8px 10px;
            text-align: center;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #bbb;
        }
        thead th:first-child { text-align: left; padding-left: 14px; }
        tbody tr { border-bottom: 1px solid #0f3460; transition: background 0.15s; }
        tbody tr:hover { background: #1e2d52; }
        tbody td { padding: 8px 10px; text-align: center; }
        tbody td:first-child { text-align: left; padding-left: 14px; }
        .pos { color: #aaa; width: 28px; }
        .team-name { font-weight: bold; color: #e0e0e0; }
        .pts { font-weight: bold; color: #e94560; }
        .top3 { background: rgba(39,174,96,0.08); }
        .bottom3 { background: rgba(192,57,43,0.08); }

        /* Fixtures */
        .matchday-group { margin-bottom: 8px; }
        .matchday-header {
            background: #0f3460;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ccc;
        }
        .matchday-header:hover { background: #1a3a6e; }
        .matchday-header .md-status { font-size: 11px; color: #888; }
        .matchday-body { display: none; }
        .matchday-body.open { display: block; }
        .fixture-row {
            display: grid;
            grid-template-columns: 1fr 80px 1fr;
            padding: 7px 14px;
            border-bottom: 1px solid #0f3460;
            font-size: 13px;
            align-items: center;
        }
        .fixture-row:last-child { border-bottom: none; }
        .fixture-home { text-align: right; color: #e0e0e0; }
        .fixture-away { text-align: left; color: #e0e0e0; }
        .fixture-score {
            text-align: center;
            font-weight: bold;
            color: #e94560;
            font-size: 14px;
        }
        .fixture-score.pending { color: #555; font-size: 12px; }
        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }
        .badge-completed { background: #1a4a2e; color: #27ae60; }
        .badge-pending { background: #1a2a3e; color: #555; }

        #loading {
            position: fixed; inset: 0;
            background: rgba(10,10,20,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-size: 18px;
            color: #e0e0e0;
        }
        #loading.active { display: flex; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>FM2K — Division One</h1>
    <span class="meta" id="seasonLabel">Season 2025/26</span>
</header>

<div class="layout">
    <div class="main-panel">

        <!-- Controls -->
        <div class="card">
            <div class="card-header">Season Controls</div>
            <div class="controls">
                <button class="btn-success" id="btnNextMatchday" onclick="nextMatchday()">Simulate Next Matchday</button>
                <button class="btn-primary" id="btnFullSeason" onclick="fullSeason()">Simulate Full Season</button>
                <button class="btn-danger" onclick="resetSeason()">Reset Season</button>
            </div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="progress-label" id="progressLabel">Matchday 0 of 22</div>
            </div>
        </div>

        <!-- Standings -->
        <div class="card">
            <div class="card-header">
                <span>League Standings</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align:left">Team</th>
                        <th>P</th><th>W</th><th>D</th><th>L</th>
                        <th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
                    </tr>
                </thead>
                <tbody id="standingsBody"></tbody>
            </table>
        </div>
    </div>

    <div class="side-panel">
        <div class="card-header" style="border-radius:6px 6px 0 0; margin-bottom:0;">
            <span>Fixtures &amp; Results</span>
            <button class="btn-secondary" style="font-size:11px;padding:4px 10px;" onclick="toggleAllMatchdays()">Toggle All</button>
        </div>
        <div id="fixturesList"></div>
    </div>
</div>

<div id="loading"><div class="spinner"></div><span id="loadingMsg">Simulating...</span></div>

<script type="module">
    import { LeagueManager } from '../league/league-manager.js'
    import { DIVISION_TEAMS } from '../league/teams-data.js'
    import { createGameDateTime } from '../timeline/game-date-time.js'

    const TOTAL_MATCHDAYS = 22
    const FIXTURES_PER_MATCHDAY = 6
    const START_DATE = createGameDateTime(2025, 8, 16, 15, 0)

    let manager = null
    let allOpen = false

    window.nextMatchday = nextMatchday
    window.fullSeason = fullSeason
    window.resetSeason = resetSeason
    window.toggleMatchday = toggleMatchday
    window.toggleAllMatchdays = toggleAllMatchdays

    function init() {
        manager = new LeagueManager({
            teams: DIVISION_TEAMS,
            startDate: START_DATE,
            eventsPerMinute: 3,
        })
        manager.subscribe(render)
        render(manager.getState())
    }

    async function nextMatchday() {
        if (!manager || !manager.hasMoreMatchdays()) return
        setLoading(true, 'Simulating matchday...')
        await manager.simulateNextMatchday()
        setLoading(false)
    }

    async function fullSeason() {
        if (!manager || !manager.hasMoreMatchdays()) return
        setLoading(true, 'Simulating full season...')
        await manager.simulateFullSeason()
        setLoading(false)
    }

    function resetSeason() {
        if (!confirm('Reset season? All results will be lost.')) return
        init()
    }

    function setLoading(active, msg = '') {
        document.getElementById('loading').classList.toggle('active', active)
        document.getElementById('loadingMsg').textContent = msg
    }

    function render(state) {
        if (!state) state = manager.getState()
        renderStandings(state.standings)
        renderFixtures(state.fixtures)
        renderProgress(state.fixtures)
        updateControls(state.fixtures)
    }

    function renderStandings(standings) {
        const tbody = document.getElementById('standingsBody')
        tbody.innerHTML = standings.map((s, i) => {
            const pos = i + 1
            const rowClass = pos <= 3 ? 'top3' : pos >= standings.length - 2 ? 'bottom3' : ''
            const gd = s.goalDifference >= 0 ? `+${s.goalDifference}` : `${s.goalDifference}`
            return `<tr class="${rowClass}">
                <td class="pos">${pos}</td>
                <td class="team-name">${s.teamName}</td>
                <td>${s.played}</td>
                <td>${s.won}</td>
                <td>${s.drawn}</td>
                <td>${s.lost}</td>
                <td>${s.goalsFor}</td>
                <td>${s.goalsAgainst}</td>
                <td>${gd}</td>
                <td class="pts">${s.points}</td>
            </tr>`
        }).join('')
    }

    function renderFixtures(fixtures) {
        const container = document.getElementById('fixturesList')
        const byMatchday = new Map()
        for (const f of fixtures) {
            if (!byMatchday.has(f.matchday)) byMatchday.set(f.matchday, [])
            byMatchday.get(f.matchday).push(f)
        }

        let html = ''
        for (const [md, mdFixtures] of byMatchday) {
            const completed = mdFixtures.filter(f => f.status === 'completed').length
            const total = mdFixtures.length
            const allDone = completed === total
            const statusText = allDone ? 'Completed' : completed > 0 ? `${completed}/${total}` : 'Scheduled'
            const open = allDone

            html += `<div class="matchday-group">
                <div class="matchday-header" onclick="toggleMatchday(${md})" id="md-hdr-${md}">
                    <span>Matchday ${md}</span>
                    <span class="md-status">${statusText}</span>
                </div>
                <div class="matchday-body${open ? ' open' : ''}" id="md-body-${md}">`

            for (const f of mdFixtures) {
                const score = f.result
                    ? `<span class="fixture-score">${f.result.homeScore} – ${f.result.awayScore}</span>`
                    : `<span class="fixture-score pending">vs</span>`
                html += `<div class="fixture-row">
                    <span class="fixture-home">${f.homeTeamName}</span>
                    ${score}
                    <span class="fixture-away">${f.awayTeamName}</span>
                </div>`
            }

            html += '</div></div>'
        }
        container.innerHTML = html

        // Auto-scroll to most recent completed matchday
        const lastCompleted = [...byMatchday.keys()].filter(md => {
            const mdFixtures = byMatchday.get(md)
            return mdFixtures.every(f => f.status === 'completed')
        }).pop()
        if (lastCompleted) {
            const el = document.getElementById(`md-hdr-${lastCompleted}`)
            if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50)
        }
    }

    function renderProgress(fixtures) {
        const completed = fixtures.filter(f => f.status === 'completed').length
        const matchdaysComplete = Math.floor(completed / FIXTURES_PER_MATCHDAY)
        const pct = (matchdaysComplete / TOTAL_MATCHDAYS) * 100
        document.getElementById('progressFill').style.width = `${pct}%`
        document.getElementById('progressLabel').textContent =
            `Matchday ${matchdaysComplete} of ${TOTAL_MATCHDAYS}`
    }

    function updateControls(fixtures) {
        const allDone = fixtures.every(f => f.status === 'completed')
        document.getElementById('btnNextMatchday').disabled = allDone
        document.getElementById('btnFullSeason').disabled = allDone
    }

    function toggleMatchday(md) {
        const body = document.getElementById(`md-body-${md}`)
        body.classList.toggle('open')
    }

    function toggleAllMatchdays() {
        allOpen = !allOpen
        document.querySelectorAll('.matchday-body').forEach(el => {
            el.classList.toggle('open', allOpen)
        })
    }

    init()
</script>
</body>
</html>
