<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreate™ Studio - Pro Kit Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Teko:wght@600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        .sport-font {
            font-family: 'Teko', sans-serif;
            letter-spacing: 0.05em;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Compact Header -->
    <header class="w-full py-3 px-6 bg-white border-b border-slate-200 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-1.5 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" />
                </svg>
            </div>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-900">Kreate™ Studio</h1>
        </div>
        <span class="text-[10px] font-bold px-2.5 py-1 bg-slate-100 text-slate-500 rounded uppercase tracking-wider">Slim-Fit Mode</span>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 max-w-[1400px] w-full mx-auto p-4 flex flex-col lg:flex-row gap-5 items-stretch">
        
        <!-- Left half: Compact Configuration Inputs -->
        <div class="w-full lg:w-4/12 flex flex-col gap-4 overflow-y-auto lg:max-h-[calc(100vh-100px)] pr-1">
            
            <!-- Category 1: Presets -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Presets</h3>
                </div>
                <div class="grid grid-cols-3 gap-2" id="preset-grid">
                    <button data-preset="custom" class="preset-btn py-2 px-1 rounded-xl bg-indigo-50 border border-indigo-600 text-[10px] font-bold text-indigo-700 transition-all">Custom</button>
                    <button data-preset="argentina" class="preset-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Argentina</button>
                    <button data-preset="brazil" class="preset-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Brazil</button>
                    <button data-preset="croatia" class="preset-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Croatia</button>
                    <button data-preset="barcelona" class="preset-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Barcelona</button>
                    <button data-preset="celtic" class="preset-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Celtic FC</button>
                </div>
            </div>

            <!-- Category 2: Jersey Patterns -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-3">Pattern Style</h3>
                <div class="grid grid-cols-3 gap-2" id="pattern-grid">
                    <button data-pattern="solid" class="pattern-btn py-2 px-1 rounded-xl bg-indigo-50 border border-indigo-600 text-[10px] font-bold text-indigo-700 transition-all">Solid</button>
                    <button data-pattern="stripes" class="pattern-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Stripes</button>
                    <button data-pattern="hoops" class="pattern-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Hoops</button>
                    <button data-pattern="checker" class="pattern-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Checker</button>
                    <button data-pattern="sash" class="pattern-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Sash</button>
                    <button data-pattern="split" class="pattern-btn py-2 px-1 rounded-xl bg-white border border-slate-200 hover:border-slate-300 text-[10px] font-bold text-slate-600 transition-all">Split</button>
                </div>
            </div>

            <!-- Category 3: Color Studio -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-3">Kit Colors</h3>
                <div class="grid grid-cols-4 gap-2">
                    <label class="flex flex-col items-center gap-1.5 p-2 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-100">
                        <input type="color" id="cPrimary" value="#ffffff" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Jersey</span>
                    </label>
                    <label class="flex flex-col items-center gap-1.5 p-2 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-100">
                        <input type="color" id="cSecondary" value="#77bbff" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Pattern</span>
                    </label>
                    <label class="flex flex-col items-center gap-1.5 p-2 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-100">
                        <input type="color" id="cCollar" value="#000000" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Trims</span>
                    </label>
                    <label class="flex flex-col items-center gap-1.5 p-2 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-100">
                        <input type="color" id="cSleeves" value="#ffffff" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Sleeves</span>
                    </label>
                    <label class="flex flex-col items-center gap-1.5 p-2 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-100">
                        <input type="color" id="cShorts" value="#000000" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Shorts</span>
                    </label>
                    <label class="flex flex-col items-center gap-1.5 p-2 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-100">
                        <input type="color" id="cShortsTrim" value="#ffffff" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Sh. Trim</span>
                    </label>
                    <label class="flex flex-col items-center gap-1.5 p-2 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-100">
                        <input type="color" id="cSocks" value="#000000" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <span class="text-[9px] font-bold uppercase text-slate-500">Socks</span>
                    </label>
                    <label class="flex flex-col items-center gap-1.5 p-2 bg-slate-50 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-100">
                        <input type="color" id="cSocksTrim" value="#ffffff" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                        <span class="text-[9px] font-bold uppercase text-slate-500">So. Trim</span>
                    </label>
                </div>
            </div>

            <!-- Category 4: Personalization -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-3">Squad Print</h3>
                <div class="grid grid-cols-5 gap-2 items-end">
                    <div class="col-span-2">
                        <label class="text-[9px] text-slate-400 font-bold uppercase mb-1.5 block">Name</label>
                        <input type="text" id="playerName" value="KREATOR" maxlength="12" class="w-full px-3 py-2 bg-slate-50 rounded-lg border border-slate-200 text-xs font-bold uppercase focus:ring-1 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="col-span-1">
                        <label class="text-[9px] text-slate-400 font-bold uppercase mb-1.5 block">No.</label>
                        <input type="number" id="playerNumber" value="10" min="1" max="99" class="w-full px-2 py-2 bg-slate-50 rounded-lg border border-slate-200 text-xs font-bold focus:ring-1 focus:ring-indigo-500 outline-none text-center">
                    </div>
                    <div class="col-span-2 flex flex-col items-center justify-center p-1 bg-slate-50 rounded-lg border border-slate-100">
                        <label class="text-[9px] text-slate-400 font-bold uppercase block mb-1">Print Color</label>
                        <input type="color" id="cText" value="#ffffff" class="w-full h-5 rounded cursor-pointer border-0 bg-transparent">
                    </div>
                </div>
            </div>

        </div>

        <!-- Right half: Immediate Live Output Canvas centered on Pitch Green -->
        <div class="w-full lg:w-8/12 rounded-3xl bg-[#064e3b] flex flex-col items-center justify-center relative shadow-inner overflow-hidden min-h-[550px]">
            
            <!-- SVG Vector Engine: Scaled down to exactly 50% width and 50% max-height -->
            <svg id="kit-engine" viewBox="80 30 280 470" class="w-1/2 max-h-[50%] drop-shadow-[0_20px_25px_rgba(0,0,0,0.4)] relative z-10 p-2">
                <defs>
                    <!-- Athletic Slim Fit Body Clip-Path -->
                    <clipPath id="front-body-clip">
                        <path d="M 155,70 L 135,130 C 135,130 155,200 165,280 Q 220,288 275,280 C 285,200 305,130 305,130 L 285,70 Q 220,85 155,70 Z" />
                    </clipPath>

                    <!-- Patterns -->
                    <pattern id="pat-vertical" width="30" height="40" patternUnits="userSpaceOnUse">
                        <rect width="15" height="40" fill="var(--primary-color)" />
                        <rect x="15" width="15" height="40" fill="var(--secondary-color)" />
                    </pattern>
                    <pattern id="pat-hoops" width="40" height="30" patternUnits="userSpaceOnUse">
                        <rect width="40" height="15" fill="var(--primary-color)" />
                        <rect y="15" width="40" height="15" fill="var(--secondary-color)" />
                    </pattern>
                    <pattern id="pat-checker" width="30" height="30" patternUnits="userSpaceOnUse">
                        <rect width="15" height="15" fill="var(--primary-color)" />
                        <rect x="15" y="15" width="15" height="15" fill="var(--primary-color)" />
                        <rect x="15" width="15" height="15" fill="var(--secondary-color)" />
                        <rect y="15" width="15" height="15" fill="var(--secondary-color)" />
                    </pattern>

                    <!-- Realism Overlays -->
                    <pattern id="pat-fabric-mesh" width="4" height="4" patternUnits="userSpaceOnUse">
                        <circle cx="2" cy="2" r="0.6" fill="#000" opacity="0.1" />
                    </pattern>
                    <linearGradient id="fabric-shading-front" x1="0" y1="0" x2="1" y2="0.1">
                        <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
                        <stop offset="15%" stop-color="#ffffff" stop-opacity="0.1" />
                        <stop offset="50%" stop-color="#000000" stop-opacity="0.0" />
                        <stop offset="85%" stop-color="#ffffff" stop-opacity="0.1" />
                        <stop offset="100%" stop-color="#000000" stop-opacity="0.3" />
                    </linearGradient>
                </defs>

                <!-- ================= SLIM-FIT FRONT VIEW ================= -->

                <!-- Sleeve Left (Athletic fit) -->
                <path d="M 155,70 L 105,115 L 120,135 L 135,130 Z" fill="var(--sleeves-color)" />
                <path d="M 105,115 L 120,135" stroke="var(--collar-color)" stroke-width="4" stroke-linecap="round" />

                <!-- Sleeve Right (Athletic fit) -->
                <path d="M 285,70 L 335,115 L 320,135 L 305,130 Z" fill="var(--sleeves-color)" />
                <path d="M 335,115 L 320,135" stroke="var(--collar-color)" stroke-width="4" stroke-linecap="round" />

                <!-- Athletic Core Body Structure -->
                <g clip-path="url(#front-body-clip)">
                    <rect x="100" y="50" width="240" height="250" fill="var(--primary-color)" />
                    
                    <!-- Dynamic Patterns Applied Here -->
                    <rect id="front-pattern" x="100" y="50" width="240" height="250" fill="url(#pat-vertical)" style="display: none;" />
                    <path id="front-sash" d="M 155,70 L 195,70 L 305,280 L 265,280 Z" fill="var(--secondary-color)" style="display: none;" />
                    <rect id="front-split" x="220" y="50" width="100" height="250" fill="var(--secondary-color)" style="display: none;" />
                    
                    <!-- Shading & Texture Mesh -->
                    <rect x="100" y="50" width="240" height="250" fill="url(#pat-fabric-mesh)" />
                    <rect x="100" y="50" width="240" height="250" fill="url(#fabric-shading-front)" pointer-events="none" mix-blend-mode="multiply" />
                    <path d="M 155,70 C 185,90 180,200 180,270" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.1" filter="blur(2px)" />
                </g>

                <!-- Detailed V-Collar -->
                <path d="M 185,76 Q 220,110 255,76 L 245,71 Q 220,95 195,71 Z" fill="var(--collar-color)" />

                <!-- Chest Branding & Number -->
                <circle cx="175" cy="115" r="11" fill="none" stroke="var(--text-color)" stroke-width="2" />
                <path d="M 170,115 Q 175,123 180,115 M 175,107 L 175,123" fill="none" stroke="var(--text-color)" stroke-width="1.5" />
                <path d="M 255,111 Q 263,113 266,108 Q 260,119 252,117 Z" fill="var(--text-color)" />
                <text id="front-squad-number" x="220" y="175" text-anchor="middle" fill="var(--text-color)" class="sport-font" font-size="38" font-weight="bold">10</text>

                <!-- Modern Slim Shorts -->
                <path d="M 165,280 L 150,370 L 215,370 L 220,330 L 225,370 L 290,370 L 275,280 Z" fill="var(--shorts-color)" />
                <path d="M 165,280 Q 220,290 275,280 L 273,288 Q 220,298 167,288 Z" fill="var(--shorts-color)" opacity="0.9" />
                <path d="M 150,370 L 215,370" stroke="var(--shorts-trim-color)" stroke-width="5" stroke-linecap="round" />
                <path d="M 290,370 L 225,370" stroke="var(--shorts-trim-color)" stroke-width="5" stroke-linecap="round" />

                <!-- Socks -->
                <rect x="162" y="390" width="26" height="85" rx="4" fill="var(--socks-color)" />
                <rect x="162" y="390" width="26" height="10" fill="var(--socks-trim-color)" />

                <rect x="252" y="390" width="26" height="85" rx="4" fill="var(--socks-color)" />
                <rect x="252" y="390" width="26" height="10" fill="var(--socks-trim-color)" />

            </svg>

            <!-- Export Button -->
            <div class="absolute bottom-5 right-5 z-20">
                <button onclick="downloadKitJSON()" class="text-[10px] font-bold px-3 py-2 bg-white/10 hover:bg-white/20 text-white rounded-lg backdrop-blur-md border border-white/10 transition-all flex items-center gap-1.5 shadow-sm uppercase tracking-wider">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                    </svg>
                    Export
                </button>
            </div>
        </div>

    </main>

    <script>
        // State
        const state = {
            cPrimary: '#ffffff',
            cSecondary: '#77bbff',
            cCollar: '#000000',
            cSleeves: '#ffffff',
            cShorts: '#000000',
            cShortsTrim: '#ffffff',
            cSocks: '#000000',
            cSocksTrim: '#ffffff',
            cText: '#000000',
            pattern: 'solid',
            playerName: 'KREATOR',
            playerNumber: '10'
        };

        const presets = {
            argentina: { cPrimary: '#ffffff', cSecondary: '#75aadb', cCollar: '#111111', cSleeves: '#75aadb', cShorts: '#111111', cShortsTrim: '#ffffff', cSocks: '#ffffff', cSocksTrim: '#75aadb', cText: '#e2b342', pattern: 'stripes', playerName: 'MESSI', playerNumber: '10' },
            brazil: { cPrimary: '#fdec0e', cSecondary: '#009c3b', cCollar: '#009c3b', cSleeves: '#fdec0e', cShorts: '#002776', cShortsTrim: '#ffffff', cSocks: '#ffffff', cSocksTrim: '#009c3b', cText: '#002776', pattern: 'solid', playerName: 'NEYMAR JR', playerNumber: '10' },
            croatia: { cPrimary: '#ffffff', cSecondary: '#ff0000', cCollar: '#ffffff', cSleeves: '#ffffff', cShorts: '#ffffff', cShortsTrim: '#ff0000', cSocks: '#ffffff', cSocksTrim: '#ff0000', cText: '#002776', pattern: 'checker', playerName: 'MODRIĆ', playerNumber: '10' },
            barcelona: { cPrimary: '#a50044', cSecondary: '#004d98', cCollar: '#fdec0e', cSleeves: '#004d98', cShorts: '#004d98', cShortsTrim: '#fdec0e', cSocks: '#004d98', cSocksTrim: '#a50044', cText: '#fdec0e', pattern: 'stripes', playerName: 'GAVI', playerNumber: '6' },
            celtic: { cPrimary: '#ffffff', cSecondary: '#018750', cCollar: '#018750', cSleeves: '#ffffff', cShorts: '#ffffff', cShortsTrim: '#018750', cSocks: '#ffffff', cSocksTrim: '#018750', cText: '#018750', pattern: 'hoops', playerName: 'KYOGO', playerNumber: '8' }
        };

        const colorPickers = ['cPrimary', 'cSecondary', 'cCollar', 'cSleeves', 'cShorts', 'cShortsTrim', 'cSocks', 'cSocksTrim', 'cText'];
        const textInputs = ['playerName', 'playerNumber'];

        function updateSVG() {
            const root = document.getElementById('kit-engine');

            // Set CSS vars
            root.style.setProperty('--primary-color', state.cPrimary);
            root.style.setProperty('--secondary-color', state.cSecondary);
            root.style.setProperty('--collar-color', state.cCollar);
            root.style.setProperty('--sleeves-color', state.cSleeves);
            root.style.setProperty('--shorts-color', state.cShorts);
            root.style.setProperty('--shorts-trim-color', state.cShortsTrim);
            root.style.setProperty('--socks-color', state.cSocks);
            root.style.setProperty('--socks-trim-color', state.cSocksTrim);
            root.style.setProperty('--text-color', state.cText);

            // Patterns display toggle
            const fPattern = document.getElementById('front-pattern');
            const fSash = document.getElementById('front-sash');
            const fSplit = document.getElementById('front-split');

            fPattern.style.display = 'none';
            fSash.style.display = 'none';
            fSplit.style.display = 'none';

            if (state.pattern === 'stripes') {
                fPattern.setAttribute('fill', 'url(#pat-vertical)');
                fPattern.style.display = 'block';
            } else if (state.pattern === 'hoops') {
                fPattern.setAttribute('fill', 'url(#pat-hoops)');
                fPattern.style.display = 'block';
            } else if (state.pattern === 'checker') {
                fPattern.setAttribute('fill', 'url(#pat-checker)');
                fPattern.style.display = 'block';
            } else if (state.pattern === 'sash') {
                fSash.style.display = 'block';
            } else if (state.pattern === 'split') {
                fSplit.style.display = 'block';
            }

            // Text
            document.getElementById('front-squad-number').textContent = state.playerNumber;
        }

        colorPickers.forEach(id => {
            const picker = document.getElementById(id);
            picker.addEventListener('input', (e) => {
                state[id] = e.target.value;
                setPresetHighlight('custom');
                updateSVG();
            });
        });

        textInputs.forEach(id => {
            const input = document.getElementById(id);
            input.addEventListener('input', (e) => {
                state[id] = e.target.value;
                updateSVG();
            });
        });

        const patternGrid = document.getElementById('pattern-grid');
        patternGrid.querySelectorAll('[data-pattern]').forEach(btn => {
            btn.addEventListener('click', () => {
                patternGrid.querySelectorAll('[data-pattern]').forEach(b => {
                    b.classList.remove('bg-indigo-50', 'border-indigo-600', 'text-indigo-700');
                    b.classList.add('bg-white', 'border-slate-200', 'text-slate-600');
                });
                btn.classList.add('bg-indigo-50', 'border-indigo-600', 'text-indigo-700');
                btn.classList.remove('bg-white', 'border-slate-200', 'text-slate-600');

                state.pattern = btn.getAttribute('data-pattern');
                updateSVG();
            });
        });

        function setPresetHighlight(presetKey) {
            const presetGrid = document.getElementById('preset-grid');
            presetGrid.querySelectorAll('[data-preset]').forEach(b => {
                b.classList.remove('bg-indigo-50', 'border-indigo-600', 'text-indigo-700');
                b.classList.add('bg-white', 'border-slate-200', 'text-slate-600');
            });
            const activeBtn = presetGrid.querySelector(`[data-preset="${presetKey}"]`);
            if (activeBtn) {
                activeBtn.classList.add('bg-indigo-50', 'border-indigo-600', 'text-indigo-700');
                activeBtn.classList.remove('bg-white', 'border-slate-200', 'text-slate-600');
            }
        }

        document.getElementById('preset-grid').querySelectorAll('[data-preset]').forEach(btn => {
            btn.addEventListener('click', () => {
                const key = btn.getAttribute('data-preset');
                setPresetHighlight(key);

                if (key !== 'custom' && presets[key]) {
                    Object.assign(state, presets[key]);
                    colorPickers.forEach(id => { document.getElementById(id).value = state[id]; });
                    document.getElementById('playerName').value = state.playerName;
                    document.getElementById('playerNumber').value = state.playerNumber;
                    
                    const targetPatternBtn = patternGrid.querySelector(`[data-pattern="${state.pattern}"]`);
                    if (targetPatternBtn) targetPatternBtn.click();
                }
                updateSVG();
            });
        });

        function downloadKitJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `Kreate-Kit-${state.playerName || 'custom'}.json`);
            dlAnchorElem.click();
        }

        updateSVG();
    </script>
</body>
</html>
